<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
<style>
.box { fill:#f5f5f5; stroke:#333; stroke-width:2; }
.title { font-family:Arial, Helvetica, sans-serif; font-size:24px; font-weight:bold; }
.label { font-family:Arial, Helvetica, sans-serif; font-size:14px; }
.arrow { stroke:#333; stroke-width:2; marker-end:url(#arrowhead); }
</style>

<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7"
 refX="10" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7"/>
</marker>
</defs>

<text x="550" y="40" text-anchor="middle" class="title">
PAM Phase Geometry Pipeline
</text>

<!-- Parameter grid -->
<rect x="80" y="180" width="220" height="120" class="box"/>
<text x="190" y="215" text-anchor="middle" class="label">Parameter Grid</text>
<text x="190" y="240" text-anchor="middle" class="label">(r, α)</text>
<text x="190" y="270" text-anchor="middle" class="label">experiment sweep</text>

<!-- Observables -->
<rect x="360" y="180" width="220" height="120" class="box"/>
<text x="470" y="215" text-anchor="middle" class="label">Observable Surfaces</text>
<text x="470" y="245" text-anchor="middle" class="label">πF_tail</text>
<text x="470" y="265" text-anchor="middle" class="label">H_joint_mean</text>
<text x="470" y="285" text-anchor="middle" class="label">ΔR² signals</text>

<!-- Fisher manifold -->
<rect x="640" y="180" width="220" height="120" class="box"/>
<text x="750" y="215" text-anchor="middle" class="label">Fisher Information</text>
<text x="750" y="240" text-anchor="middle" class="label">Metric</text>
<text x="750" y="270" text-anchor="middle" class="label">Statistical Manifold</text>

<!-- Phase structure -->
<rect x="920" y="180" width="220" height="120" class="box"/>
<text x="1030" y="215" text-anchor="middle" class="label">Phase Structure</text>
<text x="1030" y="245" text-anchor="middle" class="label">Curvature ridges</text>
<text x="1030" y="265" text-anchor="middle" class="label">Phase seams</text>
<text x="1030" y="285" text-anchor="middle" class="label">Critical points</text>

<!-- arrows -->
<line x1="300" y1="240" x2="360" y2="240" class="arrow"/>
<line x1="580" y1="240" x2="640" y2="240" class="arrow"/>
<line x1="860" y1="240" x2="920" y2="240" class="arrow"/>

<!-- bottom annotation -->
<text x="550" y="430" text-anchor="middle" class="label">
dynamics → statistics → Fisher geometry → phase structure
</text>

</svg>
