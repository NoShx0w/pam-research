<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
<style>
.box { fill:#f5f5f5; stroke:#333; stroke-width:2; }
text { font-family:Arial, Helvetica, sans-serif; }
.title { font-size:22px; font-weight:bold; }
.label { font-size:14px; }
.arrow { stroke:#333; stroke-width:2; marker-end:url(#arrowhead); }
</style>

<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7"
 refX="10" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" />
</marker>
</defs>

<text x="500" y="40" text-anchor="middle" class="title">
PAM Observatory Geometry Pipeline
</text>

<!-- experiment -->
<rect x="80" y="120" width="180" height="70" class="box"/>
<text x="170" y="150" text-anchor="middle" class="label">exp_batch.py</text>
<text x="170" y="170" text-anchor="middle" class="label">(dynamics)</text>

<rect x="300" y="120" width="180" height="70" class="box"/>
<text x="390" y="150" text-anchor="middle" class="label">index.csv</text>
<text x="390" y="170" text-anchor="middle" class="label">(observables)</text>

<line x1="260" y1="155" x2="300" y2="155" class="arrow"/>

<!-- geometry -->
<rect x="520" y="120" width="180" height="70" class="box"/>
<text x="610" y="150" text-anchor="middle" class="label">fim.py</text>
<text x="610" y="170" text-anchor="middle" class="label">(Fisher metric)</text>

<line x1="480" y1="155" x2="520" y2="155" class="arrow"/>

<rect x="740" y="120" width="180" height="70" class="box"/>
<text x="830" y="150" text-anchor="middle" class="label">fim_distance.py</text>
<text x="830" y="170" text-anchor="middle" class="label">(geodesic distance)</text>

<line x1="700" y1="155" x2="740" y2="155" class="arrow"/>

<!-- second row -->
<rect x="300" y="280" width="180" height="70" class="box"/>
<text x="390" y="310" text-anchor="middle" class="label">fim_mds.py</text>
<text x="390" y="330" text-anchor="middle" class="label">(embedding)</text>

<rect x="520" y="280" width="180" height="70" class="box"/>
<text x="610" y="310" text-anchor="middle" class="label">fim_curvature.py</text>
<text x="610" y="330" text-anchor="middle" class="label">(curvature)</text>

<rect x="740" y="280" width="180" height="70" class="box"/>
<text x="830" y="310" text-anchor="middle" class="label">phase extraction</text>
<text x="830" y="330" text-anchor="middle" class="label">(seam + critical)</text>

<line x1="610" y1="190" x2="610" y2="280" class="arrow"/>
<line x1="830" y1="190" x2="830" y2="280" class="arrow"/>

<line x1="480" y1="315" x2="520" y2="315" class="arrow"/>
<line x1="700" y1="315" x2="740" y2="315" class="arrow"/>

</svg>
