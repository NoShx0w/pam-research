<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="url(#bg)"/>

  <text x="600" y="66" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#f8fafc">
    PAM Observatory Stack
  </text>
  <text x="600" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#cbd5e1">
    experiments → observatory → geometry → interpretation
  </text>

  <!-- Main stack cards -->
  <g filter="url(#shadow)">
    <rect x="120" y="150" rx="24" ry="24" width="220" height="300" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <rect x="380" y="150" rx="24" ry="24" width="220" height="300" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <rect x="640" y="150" rx="24" ry="24" width="220" height="300" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <rect x="900" y="150" rx="24" ry="24" width="220" height="300" fill="url(#card)" stroke="#334155" stroke-width="2"/>
  </g>

  <!-- Section headers -->
  <rect x="120" y="150" rx="24" ry="24" width="220" height="10" fill="url(#accent1)"/>
  <rect x="380" y="150" rx="24" ry="24" width="220" height="10" fill="url(#accent1)"/>
  <rect x="640" y="150" rx="24" ry="24" width="220" height="10" fill="url(#accent2)"/>
  <rect x="900" y="150" rx="24" ry="24" width="220" height="10" fill="url(#accent2)"/>

  <!-- Titles -->
  <text x="230" y="205" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#f8fafc">Experiments</text>
  <text x="490" y="205" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#f8fafc">Observatory</text>
  <text x="750" y="205" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#f8fafc">Geometry</text>
  <text x="1010" y="205" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#f8fafc">Interpretation</text>

  <!-- Body text -->
  <g font-family="Inter, Arial, sans-serif" font-size="17" fill="#cbd5e1">
    <text x="150" y="250">• exp_batch.py</text>
    <text x="150" y="282">• common_quench_metrics.py</text>
    <text x="150" y="314">• parameter sweeps over (r, α, seed)</text>
    <text x="150" y="346">• outputs/index.csv</text>
    <text x="150" y="378">• outputs/trajectories/</text>

    <text x="410" y="250">• tui/app.py</text>
    <text x="410" y="282">• coverage heatmap</text>
    <text x="410" y="314">• phase diagram</text>
    <text x="410" y="346">• row / cell / trajectory view</text>
    <text x="410" y="378">• screenshots + phase_movie.py</text>

    <text x="670" y="250">• fim.py</text>
    <text x="670" y="282">• fim_distance.py</text>
    <text x="670" y="314">• fim_mds.py</text>
    <text x="670" y="346">• fim_curvature.py</text>
    <text x="670" y="378">• information manifold</text>

    <text x="930" y="250">• phase surfaces</text>
    <text x="930" y="282">• determinant ridges</text>
    <text x="930" y="314">• anisotropy / curvature</text>
    <text x="930" y="346">• geodesics / MDS</text>
    <text x="930" y="378">• research branches</text>
  </g>

  <!-- Bottom tags -->
  <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#e2e8f0">
    <rect x="150" y="405" rx="12" ry="12" width="160" height="30" fill="#0f766e" opacity="0.25"/>
    <text x="230" y="425" text-anchor="middle">dynamics</text>

    <rect x="410" y="405" rx="12" ry="12" width="160" height="30" fill="#0369a1" opacity="0.25"/>
    <text x="490" y="425" text-anchor="middle">measurement</text>

    <rect x="670" y="405" rx="12" ry="12" width="160" height="30" fill="#92400e" opacity="0.25"/>
    <text x="750" y="425" text-anchor="middle">information geometry</text>

    <rect x="930" y="405" rx="12" ry="12" width="160" height="30" fill="#7c2d12" opacity="0.25"/>
    <text x="1010" y="425" text-anchor="middle">phase structure</text>
  </g>

  <!-- Arrows -->
  <line x1="340" y1="300" x2="380" y2="300" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="300" x2="640" y2="300" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="860" y1="300" x2="900" y2="300" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

  <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#94a3b8">
    <text x="360" y="285" text-anchor="middle">observable state</text>
    <text x="620" y="285" text-anchor="middle">derived fields</text>
    <text x="880" y="285" text-anchor="middle">insight</text>
  </g>

  <!-- Lower pipeline ribbon -->
  <rect x="120" y="520" width="1000" height="110" rx="24" ry="24" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <text x="620" y="555" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">
    Repository Truth is Observation-Derived
  </text>
  <text x="620" y="590" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#cbd5e1">
    outputs/index.csv · trajectories · screenshots · FIM artifacts
  </text>
  <text x="620" y="618" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#94a3b8">
    chat = trajectory · markdown = state · git = time
  </text>
</svg>
